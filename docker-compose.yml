services:
  front:
    build:
      context: .
      target: serve
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file: .env

  front-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev
